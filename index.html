<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f5132">
<title>🀄 壞朋友的築麻小天地</title>
<style>
  :root{
    --felt:#0f5132;          /* 麻將桌綠 */
    --felt-dark:#0b3d27;
    --felt-light:#157347;
    --cream:#f7f3e8;         /* 米白卡片 */
    --cream-2:#fffdf7;
    --ink:#2b2b2b;
    --muted:#7a7468;
    --red:#c0392b;           /* 中（紅）*/
    --gold:#caa14a;          /* 金點綴 */
    --green-pos:#1e7e4f;     /* 該收 */
    --line:#e3dcc8;
    --shadow:0 4px 14px rgba(0,0,0,.18);
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, var(--felt-light) 0%, var(--felt) 45%, var(--felt-dark) 100%) fixed;
    min-height:100vh;
    padding:14px 12px 48px;
    font-size:16px;
    line-height:1.5;
  }
  .wrap{max-width:560px;margin:0 auto;}

  /* 標題 */
  header{text-align:center;color:var(--cream);margin:6px 0 14px;}
  header h1{font-size:24px;margin:0;letter-spacing:1px;text-shadow:0 2px 6px rgba(0,0,0,.35);}
  header h1 .tile{
    display:inline-block;background:var(--cream);color:var(--red);
    border-radius:7px;padding:2px 7px;margin-right:6px;
    box-shadow:inset 0 -3px 0 rgba(0,0,0,.12), var(--shadow);font-size:22px;
  }
  header .sub{font-size:13px;color:rgba(255,255,255,.78);margin-top:4px;}

  /* 分頁 */
  .tabs{display:flex;gap:8px;max-width:560px;margin:0 auto 14px;}
  .tab{
    flex:1;text-align:center;padding:11px;border-radius:13px;
    background:rgba(255,255,255,.14);color:rgba(255,255,255,.8);
    font-weight:700;font-size:15px;cursor:pointer;border:1.5px solid transparent;
  }
  .tab.active{background:var(--cream);color:var(--felt-dark);box-shadow:var(--shadow);border-color:var(--gold);}

  /* 卡片 */
  .card{
    background:var(--cream);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:14px;margin-bottom:14px;border:1px solid rgba(202,161,74,.35);
  }
  .card h2{
    font-size:15px;margin:0 0 12px;color:var(--felt-dark);
    display:flex;align-items:center;gap:7px;
    border-bottom:2px dashed var(--line);padding-bottom:8px;
  }
  .card h2 .dot{color:var(--gold);font-size:18px;}

  /* 按鈕 */
  button{font-family:inherit;font-size:15px;cursor:pointer;border:none;border-radius:12px;
    padding:10px 14px;transition:transform .05s ease, filter .15s ease;}
  button:active{transform:scale(.96);}
  .btn-primary{background:var(--felt-light);color:#fff;box-shadow:var(--shadow);}
  .btn-gold{background:var(--gold);color:#3a2e0c;font-weight:700;}
  .btn-ghost{background:transparent;color:var(--felt-dark);border:1.5px solid var(--line);}
  .btn-danger{background:#fff;color:var(--red);border:1.5px solid #e7b7b1;}
  .btn-sm{padding:6px 10px;font-size:13px;border-radius:10px;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}

  /* 日期 */
  .date-row{display:flex;align-items:center;gap:10px;}
  .date-row label{font-size:14px;font-weight:600;color:var(--felt-dark);}
  input[type=date]{
    flex:1;padding:10px;border-radius:10px;border:1px solid var(--line);
    background:#fff;font-size:16px;font-family:inherit;color:var(--ink);
  }
  input[type=date]:focus{outline:none;border-color:var(--gold);}

  /* 出席區 */
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:10px;}
  .member{position:relative;text-align:center;padding:8px 4px 6px;border-radius:14px;
    background:var(--cream-2);border:2px solid transparent;cursor:pointer;user-select:none;}
  .member.present{border-color:var(--green-pos);background:#eef8f0;}
  .member .avatar{
    width:52px;height:52px;border-radius:50%;margin:0 auto 5px;
    background:#ded7c4 center/cover no-repeat;display:flex;align-items:center;justify-content:center;
    font-size:22px;color:#8a8161;border:2px solid var(--gold);overflow:hidden;}
  .member .nm{font-size:13px;font-weight:600;word-break:break-all;line-height:1.2;}
  .member .check{position:absolute;top:4px;right:6px;font-size:15px;color:var(--green-pos);opacity:0;}
  .member.present .check{opacity:1;}
  .member .edit{position:absolute;top:2px;left:4px;font-size:12px;color:var(--muted);
    background:rgba(255,255,255,.85);border-radius:8px;padding:1px 5px;line-height:1.4;}
  .add-member{border:2px dashed var(--line);background:transparent;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:92px;border-radius:14px;font-size:13px;}
  .add-member .plus{font-size:26px;line-height:1;margin-bottom:2px;color:var(--felt-light);}

  /* 金額輸入卡 */
  .empty-tip{color:var(--muted);font-size:14px;text-align:center;padding:14px 4px;}
  .pcard{display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;
    background:var(--cream-2);border:1px solid var(--line);margin-bottom:10px;}
  .pcard .avatar{width:42px;height:42px;border-radius:50%;flex:0 0 42px;
    background:#ded7c4 center/cover no-repeat;display:flex;align-items:center;justify-content:center;
    font-size:18px;color:#8a8161;border:2px solid var(--gold);overflow:hidden;}
  .pcard .pbody{flex:1;min-width:0;}
  .pcard .pname{font-weight:700;font-size:14px;margin-bottom:6px;}
  .fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:2px;}
  .field input{width:100%;border:1px solid var(--line);border-radius:9px;padding:8px 6px;
    font-size:15px;text-align:right;background:#fff;font-family:inherit;color:var(--ink);}
  .field input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(202,161,74,.25);}
  .field.win input{font-weight:700;}

  /* 結帳人 */
  .payer-row{display:flex;flex-wrap:wrap;gap:10px;}
  .payer-row .pcol{flex:1 1 calc(50% - 5px);min-width:120px;}
  .payer-row label{display:block;font-size:13px;color:var(--felt-dark);font-weight:600;margin-bottom:5px;}
  /* 本日活動複選 */
  .act-chips{display:flex;flex-wrap:wrap;gap:8px;}
  .act-chip{display:flex;align-items:center;gap:5px;padding:8px 13px;border-radius:999px;
    border:1.5px solid var(--line);background:#fff;font-size:14px;font-weight:600;
    color:var(--felt-dark);cursor:pointer;user-select:none;transition:.12s;}
  .act-chip.on{background:#eef8f0;border-color:var(--green-pos);color:var(--green-pos);}
  .act-chip.on.mahjong{background:#fbf3e0;border-color:var(--gold);color:#8a6d1e;}
  select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);
    background:#fff;font-size:15px;font-family:inherit;color:var(--ink);}
  select:focus{outline:none;border-color:var(--gold);}

  /* 結果 */
  .net-list{display:flex;flex-direction:column;gap:7px;}
  .net-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:11px;
    background:var(--cream-2);border:1px solid var(--line);}
  .net-item .avatar{width:34px;height:34px;border-radius:50%;flex:0 0 34px;
    background:#ded7c4 center/cover no-repeat;display:flex;align-items:center;justify-content:center;
    font-size:15px;color:#8a8161;border:2px solid var(--gold);overflow:hidden;}
  .net-item .nname{flex:1;font-weight:600;}
  .net-item .amt{font-weight:800;font-size:16px;}
  .amt.pos{color:var(--green-pos);}
  .amt.neg{color:var(--red);}
  .amt.zero{color:var(--muted);}

  .balance-warn{background:#fff4e5;border:1px solid #f0c987;color:#8a5b00;
    padding:9px 11px;border-radius:11px;font-size:13px;margin-bottom:10px;
    display:flex;gap:7px;align-items:flex-start;}

  .transfer-list{display:flex;flex-direction:column;gap:8px;}
  .transfer{display:flex;align-items:center;gap:8px;padding:11px 12px;border-radius:12px;
    background:linear-gradient(135deg,#fffdf7,#f3ecd9);border:1px solid var(--gold);}
  .transfer .ava{width:34px;height:34px;border-radius:50%;flex:0 0 34px;
    background:#ded7c4 center/cover no-repeat;display:flex;align-items:center;justify-content:center;
    font-size:14px;color:#8a8161;border:2px solid var(--gold);overflow:hidden;}
  .transfer .who{font-weight:700;font-size:14px;}
  .transfer .arrow{color:var(--red);font-size:18px;font-weight:800;margin:0 2px;}
  .transfer .tamt{margin-left:auto;font-weight:800;color:var(--felt-dark);font-size:16px;}
  .transfer .tamt .dollar{color:var(--gold);}
  .result-ok{text-align:center;color:var(--muted);padding:10px;font-size:14px;}
  .sync-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    margin:0 2px 10px;padding:8px 12px;background:rgba(255,255,255,.12);border-radius:12px;}
  .sync-status{font-size:13px;color:#eafae6;}
  .sync-status.warn{color:#ffd9a8;}
  .sync-status.ok{color:#bff0bb;}
  .btn-refresh{background:#fff;color:var(--green,#1f5e3a);border:1.5px solid #cfe6cf;
    border-radius:10px;padding:7px 12px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .btn-refresh:active{transform:scale(.97);}

  /* 紀錄頁 */
  .rank-list{display:flex;flex-direction:column;gap:8px;}
  .rank-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:12px;
    background:var(--cream-2);border:1px solid var(--line);}
  .rank-item .pos-no{font-weight:800;color:var(--gold);width:22px;text-align:center;font-size:15px;}
  .rank-item .avatar{width:38px;height:38px;border-radius:50%;flex:0 0 38px;
    background:#ded7c4 center/cover no-repeat;display:flex;align-items:center;justify-content:center;
    font-size:16px;color:#8a8161;border:2px solid var(--gold);overflow:hidden;}
  .rank-item .rinfo{flex:1;min-width:0;}
  .rank-item .rname{font-weight:700;}
  .rank-item .rmeta{font-size:12px;color:var(--muted);}
  .rank-item .rtotal{font-weight:800;font-size:17px;}

  .session{border:1px solid var(--line);border-radius:12px;background:var(--cream-2);
    padding:10px 12px;margin-bottom:10px;}
  .session .shead{display:flex;align-items:center;margin-bottom:8px;}
  .session .sdate{font-weight:800;color:var(--felt-dark);}
  .session .sdel{margin-left:auto;color:var(--red);background:none;border:none;font-size:13px;padding:4px 6px;}
  .session .sentries{display:flex;flex-direction:column;gap:5px;}
  .session .sentry{display:flex;align-items:center;gap:8px;font-size:14px;}
  .session .sentry .se-ava{width:26px;height:26px;border-radius:50%;flex:0 0 26px;
    background:#ded7c4 center/cover no-repeat;display:flex;align-items:center;justify-content:center;
    font-size:12px;color:#8a8161;border:1.5px solid var(--gold);overflow:hidden;}
  .session .sentry .se-name{flex:1;}
  .session .sentry .se-amt{font-weight:700;}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
    align-items:center;justify-content:center;padding:18px;z-index:50;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--cream);border-radius:18px;width:100%;max-width:360px;
    padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.4);}
  .modal h3{margin:0 0 14px;font-size:17px;color:var(--felt-dark);text-align:center;}
  .modal .avatar-pick{width:96px;height:96px;border-radius:50%;margin:0 auto 14px;
    background:#ded7c4 center/cover no-repeat;border:3px solid var(--gold);
    display:flex;align-items:center;justify-content:center;font-size:30px;color:#8a8161;
    cursor:pointer;overflow:hidden;position:relative;}
  .modal .avatar-pick .cam{position:absolute;bottom:0;right:0;background:var(--felt-light);
    color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;
    justify-content:center;font-size:15px;border:2px solid var(--cream);}
  .modal input[type=text],.modal input[type=password]{width:100%;padding:11px;border-radius:11px;border:1px solid var(--line);
    font-size:16px;font-family:inherit;margin-bottom:14px;text-align:center;}
  .modal input[type=text]:focus,.modal input[type=password]:focus{outline:none;border-color:var(--gold);}
  .gate-tip{margin:0 0 14px;font-size:13px;color:var(--felt-dark);text-align:center;line-height:1.5;}
  .modal .m-actions{display:flex;gap:8px;}
  .modal .m-actions button{flex:1;}
  .modal .del-link{display:block;text-align:center;margin-top:12px;color:var(--red);
    font-size:13px;background:none;border:none;width:100%;}
  .hidden{display:none !important;}

  footer{text-align:center;color:rgba(255,255,255,.6);font-size:11px;margin-top:18px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="tile">🀄</span>壞朋友的築麻小天地</h1>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="settle">💰 結算</div>
    <div class="tab" data-tab="records">📒 紀錄</div>
  </div>

  <!-- ============ 結算頁 ============ -->
  <div id="page-settle">
    <!-- 日期 -->
    <section class="card">
      <div class="date-row">
        <label>📅 日期</label>
        <input type="date" id="dateInput">
      </div>
    </section>

    <!-- 出席區 -->
    <section class="card">
      <h2><span class="dot">●</span>本場出席（點頭貼勾選）</h2>
      <div class="roster" id="roster"></div>
    </section>

    <!-- 本日活動 -->
    <section class="card">
      <h2><span class="dot">●</span>本日活動（可複選）</h2>
      <div class="act-chips" id="actChips"></div>
    </section>

    <!-- 金額輸入 -->
    <section class="card">
      <h2><span class="dot">●</span>金額輸入</h2>
      <div id="amountList"></div>
      <div class="empty-tip hidden" id="amountEmpty">先在上方勾選出席的人，這裡就會出現輸入欄位 🀙</div>
    </section>

    <!-- 結帳人 -->
    <section class="card" id="payerCard">
      <h2><span class="dot">●</span>誰先結帳付錢的</h2>
      <div class="payer-row" id="payerRow"></div>
    </section>

    <!-- 結果 -->
    <section class="card">
      <h2><span class="dot">●</span>結算結果</h2>
      <div id="balanceWarn"></div>
      <div class="net-list" id="netList"></div>
      <h2 style="margin-top:16px;"><span class="dot">●</span>最佳轉帳路徑</h2>
      <div class="transfer-list" id="transferList"></div>
    </section>

    <div class="btn-row" style="justify-content:center;margin-top:6px;">
      <button class="btn-gold" id="saveRecordBtn">💾 儲存本場麻將紀錄</button>
      <button class="btn-danger" id="resetRoundBtn">🧹 清除本場</button>
    </div>
  </div>

  <!-- ============ 紀錄頁 ============ -->
  <div id="page-records" class="hidden">
    <div class="sync-bar">
      <span class="sync-status" id="syncStatus"></span>
      <button class="btn-refresh" id="refreshBtn">🔄 重新整理</button>
    </div>
    <section class="card">
      <h2><span class="dot">●</span>累積輸贏排行</h2>
      <div class="rank-list" id="rankList"></div>
    </section>
    <section class="card">
      <h2><span class="dot">●</span>每場紀錄</h2>
      <div id="sessionList"></div>
    </section>
  </div>

</div>

<!-- 成員編輯 Modal -->
<div class="modal-bg" id="memberModal">
  <div class="modal">
    <h3 id="modalTitle">新增成員</h3>
    <div class="avatar-pick" id="avatarPick">
      <span id="avatarPlaceholder">🀄</span>
      <span class="cam">📷</span>
    </div>
    <input type="file" id="avatarFile" accept="image/*" class="hidden">
    <input type="text" id="memberName" placeholder="輸入名字" maxlength="10">
    <div class="m-actions">
      <button class="btn-ghost" id="modalCancel">取消</button>
      <button class="btn-gold" id="modalSave">儲存</button>
    </div>
    <button class="del-link hidden" id="modalDelete">刪除這位成員</button>
  </div>
</div>

<!-- 通關密碼鎖 -->
<div class="modal-bg" id="gateModal">
  <div class="modal">
    <h3>🔒 輸入通關密碼</h3>
    <p class="gate-tip" id="gateTip">請向揪團的人索取密碼，才能讀取與儲存紀錄。</p>
    <input type="password" id="gatePass" inputmode="numeric" placeholder="通關密碼" autocomplete="off">
    <div class="m-actions">
      <button class="btn-gold" id="gateEnter">進入</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  const STORAGE_KEY = "mahjong-settle-v1";

  /* ===== Google Sheet 雲端同步設定 =====
     填好後每場紀錄與排行就會同步到 Sheet，誰打開都看到最新。
     SHEET_API：Apps Script 部署的 Web App 網址（結尾 /exec）。留空＝只用本機，不同步。
     SHEET_TOKEN：通關碼，要跟 apps-script.gs 裡的 TOKEN 一模一樣。 */
  const SHEET_API = "https://script.google.com/macros/s/AKfycbz89ubxdX2igppaQZv5DUZIdSh_c26r4Jj_Bx0rVPAgGqx_C5qi9QnKtRecWnIM0nYS/exec";
  /* 通關密碼不寫死在檔案裡：開啟時請使用者輸入，驗證成功後存本機，之後當作 token 使用。 */
  const TOKEN_KEY = "mahjong-passcode";
  let sheetToken = localStorage.getItem(TOKEN_KEY) || "";
  const SYNC_ON = !!SHEET_API;
  let syncStatus = SYNC_ON ? "idle" : "off";   // off | idle | syncing | ok | offline
  const EPS = 0.01;

  /* 預設常駐成員（之後可由使用者上傳的頭貼直接內建到這裡）。

  const ACTIVITIES = [
    {key:"lunch",     label:"午餐",   icon:"🍱", type:"expense"},
    {key:"dinner",    label:"晚餐",   icon:"🍜", type:"expense"},
    {key:"drink",     label:"飲料",   icon:"🧋", type:"expense"},
    {key:"teatime",   label:"下午茶", icon:"☕", type:"expense"},
    {key:"latenight", label:"宵夜",   icon:"🍢", type:"expense"},
    {key:"win",       label:"輸贏",   icon:"🀄", type:"mahjong"}
  ];
  function selectedActivities(){ return ACTIVITIES.filter(a=>state.activities.indexOf(a.key)>=0); }
  function selectedExpenses(){ return selectedActivities().filter(a=>a.type==="expense"); }
  function winSelected(){ return state.activities.indexOf("win")>=0; }

  let state = {
    members: [],          // [{id,name,avatar}]
    present: {},          // {id:true}
    amounts: {},          // {id:{<活動key>:金額}}
    payers: {},           // {<花費活動key>:結帳人id}
    activities: ["lunch","dinner","win"],   // 本日活動（可複選）
    date: "",             // 本場日期 yyyy-mm-dd
    history: []           // [{id,date,entries:[{memberId,name,win}],createdAt}]
  };

  /* ---------- 持久化 ---------- */
  function save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){ console.warn("存檔失敗", e); }
  }
  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const s = JSON.parse(raw);
        state = Object.assign({members:[],present:{},amounts:{},payers:{},activities:["lunch","dinner","win"],date:"",history:[]}, s);
        if(!Array.isArray(state.history)) state.history=[];
        if(!Array.isArray(state.activities)) state.activities=["lunch","dinner","win"];
        if(!state.payers || typeof state.payers!=="object") state.payers={};
        if(s.lunchPayer && !state.payers.lunch) state.payers.lunch=s.lunchPayer;
        if(s.dinnerPayer && !state.payers.dinner) state.payers.dinner=s.dinnerPayer;
        delete state.lunchPayer; delete state.dinnerPayer;
      }
    }catch(e){ console.warn("讀檔失敗", e); }
    if(!state.members || state.members.length===0){
      state.members = DEFAULT_MEMBERS.map(m=>Object.assign({},m));
    }
    state.members.forEach(m=>{ if(typeof m.updatedAt!=="number") m.updatedAt=0; if(m.synced===undefined) m.synced=!SYNC_ON; });
    if(!state.date) state.date = todayStr();
    if(!Array.isArray(state.history)) state.history=[];
    state.history.forEach(r=>{ if(!r.sessionId) r.sessionId=r.id||uid(); if(r.synced===undefined) r.synced=!SYNC_ON; });
  }

  /* ---------- 雲端同步（Google Sheet） ---------- */
  function setSyncStatus(s){ syncStatus=s; renderSyncStatus(); }
  function renderSyncStatus(){
    const el=document.getElementById("syncStatus");
    if(!el) return;
    const map={off:"", idle:"☁️ 雲端同步已開啟", syncing:"⏳ 同步中…", ok:"✅ 已同步到雲端", offline:"📴 離線，顯示本機快取（稍後自動重試）"};
    el.textContent = map[syncStatus]||"";
    el.className = "sync-status" + (syncStatus==="offline"?" warn":(syncStatus==="ok"?" ok":""));
  }

  /* 把伺服器的每人每場列彙整回 history（依 sessionId 分組） */
  function recordsToHistory(records){
    const map={};
    records.forEach(r=>{
      if(!map[r.sessionId]) map[r.sessionId]={id:r.sessionId, sessionId:r.sessionId, date:normDate(r.date), createdAt:r.createdAt||0, entries:[], synced:true};
      map[r.sessionId].entries.push({memberId:r.memberId, name:r.name, win:num(r.win)});
      if(r.createdAt) map[r.sessionId].createdAt=Math.max(map[r.sessionId].createdAt, r.createdAt);
    });
    return Object.values(map);
  }

  async function syncFromSheet(){
    if(!SYNC_ON) return;
    if(!sheetToken){ showGate(false); setSyncStatus("idle"); return; }
    setSyncStatus("syncing");
    try{
      const url = SHEET_API + (SHEET_API.includes("?")?"&":"?") + "action=list&token=" + encodeURIComponent(sheetToken);
      const res = await fetch(url, {method:"GET"});
      const data = await res.json();
      if(!data.ok){
        if(/token/i.test(data.error||"")){ clearToken(); showGate(true); setSyncStatus("idle"); return; }
        throw new Error(data.error||"server error");
      }
      hideGate();
      const server = recordsToHistory(data.records||[]);
      const serverIds = new Set(server.map(s=>s.sessionId));
      const pending = state.history.filter(r=>!r.synced && !serverIds.has(r.sessionId));
      state.history = server.concat(pending);
      // 合併名單（名字／頭貼）：後寫者勝，未上傳的本機異動補送
      const pendingMembers = mergeMembers(data.members||[]);
      save();
      renderSettle();
      renderRecords();
      setSyncStatus("ok");
      // 把本機尚未上傳的場次與成員異動補送
      for(const rec of pending){ await pushSession(rec, true); }
      for(const m of pendingMembers){ await pushMember(m, true); }
    }catch(e){
      console.warn("同步失敗，使用本機快取", e);
      setSyncStatus("offline");
    }
  }

  async function pushSession(rec, quiet){
    if(!SYNC_ON) return true;
    if(!quiet) setSyncStatus("syncing");
    try{
      const res = await fetch(SHEET_API, {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({action:"save", token:sheetToken, session:{
          sessionId:rec.sessionId, date:rec.date, createdAt:rec.createdAt, entries:rec.entries
        }})
      });
      const data = await res.json();
      if(!data.ok) throw new Error(data.error||"server error");
      const local = state.history.find(r=>r.sessionId===rec.sessionId);
      if(local) local.synced=true;
      save();
      if(!quiet) setSyncStatus("ok");
      return true;
    }catch(e){
      console.warn("上傳失敗，已暫存本機", e);
      setSyncStatus("offline");
      return false;
    }
  }

  async function deleteFromSheet(sessionId){
    if(!SYNC_ON) return true;
    try{
      const res = await fetch(SHEET_API, {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({action:"delete", token:sheetToken, sessionId})
      });
      const data = await res.json();
      if(!data.ok) throw new Error(data.error||"server error");
      setSyncStatus("ok");
      return true;
    }catch(e){
      console.warn("刪除同步失敗", e);
      setSyncStatus("offline");
      return false;
    }
  }

  /* 合併伺服器名單到本機：後寫者勝（updatedAt）。回傳「需補送到雲端」的成員陣列。 */
  function mergeMembers(serverMembers){
    const byId={};
    state.members.forEach(m=>{ byId[m.id]=m; });
    serverMembers.forEach(sm=>{
      const local=byId[sm.id];
      if(!local || (sm.updatedAt||0) >= (local.updatedAt||0)){
        byId[sm.id]={id:sm.id, name:sm.name, avatar:sm.avatar||"", updatedAt:sm.updatedAt||0, synced:true};
      }
    });
    state.members = Object.values(byId);
    // 伺服器為空（首次）→ 把本機名單全部當初始名單上傳；否則只補送尚未同步者
    return state.members.filter(m=>!m.synced);
  }

  /* 把過大的 base64 頭貼再壓小（Google 試算表單格上限 5 萬字元） */
  function shrinkDataUri(dataUri, maxSize, quality){
    return new Promise(resolve=>{
      try{
        const img=new Image();
        img.onload=()=>{
          let {width,height}=img;
          if(width>height){ if(width>maxSize){height*=maxSize/width;width=maxSize;} }
          else { if(height>maxSize){width*=maxSize/height;height=maxSize;} }
          const canvas=document.createElement("canvas");
          canvas.width=width; canvas.height=height;
          canvas.getContext("2d").drawImage(img,0,0,width,height);
          resolve(canvas.toDataURL("image/jpeg",quality));
        };
        img.onerror=()=>resolve(null);
        img.src=dataUri;
      }catch(e){ resolve(null); }
    });
  }

  async function pushMember(m, quiet){
    if(!SYNC_ON) return true;
    if(!quiet) setSyncStatus("syncing");
    try{
      if(m.avatar && m.avatar.length>40000){
        const small = await shrinkDataUri(m.avatar, 200, 0.7);
        if(small && small.length < m.avatar.length){
          m.avatar = small;
          const local = state.members.find(x=>x.id===m.id);
          if(local) local.avatar = small;
          save();
        }
      }
      const res = await fetch(SHEET_API, {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({action:"saveMember", token:sheetToken, member:{
          id:m.id, name:m.name, avatar:m.avatar||"", updatedAt:m.updatedAt||Date.now()
        }})
      });
      const data = await res.json();
      if(!data.ok) throw new Error(data.error||"server error");
      const local = state.members.find(x=>x.id===m.id);
      if(local) local.synced=true;
      save();
      if(!quiet) setSyncStatus("ok");
      return true;
    }catch(e){
      console.warn("成員上傳失敗，已暫存本機", e);
      setSyncStatus("offline");
      return false;
    }
  }

  /* ---------- 工具 ---------- */
  function uid(){ return "m"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
  function todayStr(){
    const d=new Date(); const p=n=>String(n).padStart(2,"0");
    return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());
  }
  /* 把任何日期字串正規化成 YYYY-MM-DD（Sheet 可能把日期回成 datetime 字串） */
  function normDate(d){
    if(!d) return todayStr();
    const s=String(d);
    if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const dt=new Date(s); if(isNaN(dt)) return s;
    const p=n=>String(n).padStart(2,"0");
    return dt.getFullYear()+"-"+p(dt.getMonth()+1)+"-"+p(dt.getDate());
  }
  function fmt(n){ return Math.round(n).toLocaleString("en-US"); }
  function num(v){ const n=parseFloat(v); return isNaN(n)?0:n; }
  function memberById(id){ return state.members.find(m=>m.id===id); }
  function avatarStyle(m){ return m && m.avatar ? `style="background-image:url('${m.avatar}')"` : ""; }
  function avatarInner(m){ return (m && m.avatar) ? "" : (m? firstChar(m.name):"🀄"); }
  function firstChar(name){ return name ? Array.from(name)[0] : "?"; }
  function presentMembers(){ return state.members.filter(m=>state.present[m.id]); }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ---------- 計算淨額（依本日活動） ---------- */
  function computeNets(){
    const ps = presentMembers();
    const exps = selectedExpenses();
    const hasWin = winSelected();
    const net = {};
    ps.forEach(m=> net[m.id]=0 );
    // 各項花費：自己吃多少就扣多少，墊錢的人把總額加回來
    exps.forEach(act=>{
      let total=0;
      ps.forEach(m=>{
        const v = num((state.amounts[m.id]||{})[act.key]);
        net[m.id] -= v; total += v;
      });
      const payer = state.payers[act.key];
      if(payer && net.hasOwnProperty(payer)) net[payer] += total;
    });
    // 麻將輸贏（正=贏、負=輸）
    if(hasWin){
      ps.forEach(m=>{ net[m.id] += num((state.amounts[m.id]||{}).win); });
    }
    return {net, ps};
  }

  /* 最少筆數轉帳：貪婪配對「應收最多」與「應付最多」 */
  function minTransfers(net){
    const C=[], D=[];
    Object.keys(net).forEach(id=>{
      const v=net[id];
      if(v>EPS) C.push({id,amt:v});        // 債權人（應收）
      else if(v<-EPS) D.push({id,amt:-v}); // 債務人（應付）
    });
    const res=[];
    while(C.length && D.length){
      C.sort((a,b)=>b.amt-a.amt);
      D.sort((a,b)=>b.amt-a.amt);
      const c=C[0], d=D[0];
      const pay=Math.min(c.amt, d.amt);
      res.push({from:d.id, to:c.id, amount:pay});
      c.amt-=pay; d.amt-=pay;
      if(c.amt<=EPS) C.shift();
      if(d.amt<=EPS) D.shift();
    }
    return res;
  }

  function renderResults(){
    const {net, ps} = computeNets();
    const netEl = document.getElementById("netList");
    netEl.innerHTML = "";
    if(ps.length===0){
      netEl.innerHTML = `<div class="result-ok">尚未選擇出席者</div>`;
      document.getElementById("transferList").innerHTML="";
      document.getElementById("balanceWarn").innerHTML="";
      return;
    }
    let sum=0;
    ps.forEach(m=>{
      const v = net[m.id]||0; sum+=v;
      const cls = v>EPS?"pos":(v<-EPS?"neg":"zero");
      const sign = v>EPS?"應收 +":(v<-EPS?"應付 −":"");
      const div=document.createElement("div");
      div.className="net-item";
      div.innerHTML =
        `<div class="avatar" ${avatarStyle(m)}>${avatarInner(m)}</div>`+
        `<div class="nname">${escapeHtml(m.name)}</div>`+
        `<div class="amt ${cls}">${cls==="zero"?"持平 $0":sign+"$"+fmt(Math.abs(v))}</div>`;
      netEl.appendChild(div);
    });
    const warnEl=document.getElementById("balanceWarn");
    if(Math.abs(sum)>EPS){
      warnEl.innerHTML = `<div class="balance-warn"><span>⚠️</span>`+
        `<span>目前所有人淨額加總為 <b>${sum>0?"+":""}${fmt(sum)}</b>，不是 0。`+
        `通常代表麻將輸贏沒對平，請檢查輸贏金額（贏的總和應等於輸的總和）。</span></div>`;
    }else{ warnEl.innerHTML=""; }
    const tEl=document.getElementById("transferList");
    const transfers = minTransfers(Object.assign({},net));
    if(transfers.length===0){
      tEl.innerHTML = `<div class="result-ok">🎉 不用轉帳，大家剛好打平！</div>`;
    }else{
      tEl.innerHTML="";
      transfers.forEach(t=>{
        const from=memberById(t.from), to=memberById(t.to);
        const div=document.createElement("div");
        div.className="transfer";
        div.innerHTML =
          `<div class="ava" ${avatarStyle(from)}>${avatarInner(from)}</div>`+
          `<span class="who">${escapeHtml(from.name)}</span>`+
          `<span class="arrow">→</span>`+
          `<div class="ava" ${avatarStyle(to)}>${avatarInner(to)}</div>`+
          `<span class="who">${escapeHtml(to.name)}</span>`+
          `<span class="tamt"><span class="dollar">$</span>${fmt(t.amount)}</span>`;
        tEl.appendChild(div);
      });
    }
  }

  /* ---------- 儲存本場麻將紀錄 ---------- */
  document.getElementById("saveRecordBtn").addEventListener("click", ()=>{
    if(!winSelected()){ alert("本場沒有選「輸贏」活動，沒有麻將紀錄可儲存。"); return; }
    const ps = presentMembers();
    if(ps.length===0){ alert("尚未勾選任何出席者，無法儲存紀錄。"); return; }
    const entries = ps.map(m=>{
      const a=state.amounts[m.id]||{};
      return {memberId:m.id, name:m.name, win:num(a.win)};
    });
    const sum = entries.reduce((s,e)=>s+e.win,0);
    if(Math.abs(sum)>EPS){
      if(!confirm(`本場麻將輸贏加總為 ${sum>0?"+":""}${fmt(sum)}（不是 0），通常代表沒對平。仍要儲存嗎？`)) return;
    }
    const sid = uid();
    const rec = {id:sid, sessionId:sid, date:state.date||todayStr(), entries, createdAt:Date.now(), synced:!SYNC_ON};
    state.history.push(rec);
    save();
    renderRecords();
    alert("已儲存到「紀錄」分頁 ✔" + (SYNC_ON?"，同步雲端中…":""));
    if(SYNC_ON) pushSession(rec);
  });

  /* ---------- 紀錄頁渲染 ---------- */
  function renderRecords(){
    // 累積排行
    const totals={}, counts={};
    state.history.forEach(rec=>{
      rec.entries.forEach(e=>{
        totals[e.memberId]=(totals[e.memberId]||0)+e.win;
        counts[e.memberId]=(counts[e.memberId]||0)+1;
      });
    });
    const rankEl=document.getElementById("rankList");
    const ids=Object.keys(totals);
    if(ids.length===0){
      rankEl.innerHTML=`<div class="result-ok">還沒有任何紀錄。到「結算」分頁填好輸贏後按「💾 儲存本場麻將紀錄」。</div>`;
    }else{
      ids.sort((a,b)=>totals[b]-totals[a]);
      rankEl.innerHTML="";
      ids.forEach((id,i)=>{
        const m=memberById(id);
        const lastName = (()=>{ for(let k=state.history.length-1;k>=0;k--){const e=state.history[k].entries.find(x=>x.memberId===id); if(e) return e.name;} return "?"; })();
        const name = m? m.name : lastName;
        const v=totals[id];
        const cls=v>EPS?"pos":(v<-EPS?"neg":"zero");
        const div=document.createElement("div");
        div.className="rank-item";
        div.innerHTML=
          `<div class="pos-no">${i+1}</div>`+
          `<div class="avatar" ${avatarStyle(m)}>${m?avatarInner(m):firstChar(name)}</div>`+
          `<div class="rinfo"><div class="rname">${escapeHtml(name)}</div>`+
            `<div class="rmeta">共 ${counts[id]} 場</div></div>`+
          `<div class="rtotal amt ${cls}">${v>EPS?"+":(v<-EPS?"−":"")}$${fmt(Math.abs(v))}</div>`;
        rankEl.appendChild(div);
      });
    }
    // 每場紀錄
    const sEl=document.getElementById("sessionList");
    if(state.history.length===0){
      sEl.innerHTML=`<div class="result-ok">尚無紀錄</div>`;
      return;
    }
    const sorted=state.history.slice().sort((a,b)=> (b.date===a.date ? b.createdAt-a.createdAt : (a.date<b.date?1:-1)) );
    sEl.innerHTML="";
    sorted.forEach(rec=>{
      const wrap=document.createElement("div");
      wrap.className="session";
      const entriesHtml=rec.entries.map(e=>{
        const m=memberById(e.memberId);
        const cls=e.win>EPS?"pos":(e.win<-EPS?"neg":"zero");
        return `<div class="sentry">`+
          `<div class="se-ava" ${avatarStyle(m)}>${m?avatarInner(m):firstChar(e.name)}</div>`+
          `<div class="se-name">${escapeHtml(m?m.name:e.name)}</div>`+
          `<div class="se-amt amt ${cls}">${e.win>EPS?"+":(e.win<-EPS?"−":"")}$${fmt(Math.abs(e.win))}</div>`+
        `</div>`;
      }).join("");
      wrap.innerHTML=
        `<div class="shead"><span class="sdate">📅 ${escapeHtml(rec.date)}</span>`+
        `<button class="sdel" data-del="${rec.id}">刪除</button></div>`+
        `<div class="sentries">${entriesHtml}</div>`;
      sEl.appendChild(wrap);
    });
    sEl.querySelectorAll("[data-del]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        if(!confirm("刪除這場紀錄？")) return;
        const rec=state.history.find(r=>r.id===btn.dataset.del);
        const sid=rec?rec.sessionId:btn.dataset.del;
        state.history=state.history.filter(r=>r.id!==btn.dataset.del);
        save(); renderRecords();
        if(SYNC_ON) deleteFromSheet(sid);
      });
    });
  }

  /* ---------- 成員 Modal ---------- */
  let editingId=null, pendingAvatar=null;
  function openMemberModal(id){
    editingId=id; pendingAvatar=null;
    const m = id?memberById(id):null;
    document.getElementById("modalTitle").textContent = m?"編輯成員":"新增成員";
    document.getElementById("memberName").value = m?m.name:"";
    const pick=document.getElementById("avatarPick");
    const ph=document.getElementById("avatarPlaceholder");
    if(m && m.avatar){ pick.style.backgroundImage=`url('${m.avatar}')`; ph.textContent=""; }
    else { pick.style.backgroundImage=""; ph.textContent= m?firstChar(m.name):"🀄"; }
    document.getElementById("modalDelete").classList.toggle("hidden", !id);
    document.getElementById("memberModal").classList.add("show");
  }
  function closeMemberModal(){ document.getElementById("memberModal").classList.remove("show"); }

  document.getElementById("avatarPick").addEventListener("click", ()=>document.getElementById("avatarFile").click());
  document.getElementById("avatarFile").addEventListener("change", e=>{
    const file=e.target.files[0]; if(!file) return;
    resizeImage(file, 200, dataUri=>{
      pendingAvatar=dataUri;
      const pick=document.getElementById("avatarPick");
      pick.style.backgroundImage=`url('${dataUri}')`;
      document.getElementById("avatarPlaceholder").textContent="";
    });
  });
  document.getElementById("modalCancel").addEventListener("click", closeMemberModal);
  document.getElementById("memberModal").addEventListener("click", e=>{
    if(e.target.id==="memberModal") closeMemberModal();
  });
  document.getElementById("modalSave").addEventListener("click", ()=>{
    const name=document.getElementById("memberName").value.trim();
    if(!name){ alert("請輸入名字"); return; }
    let changed;
    if(editingId){
      const m=memberById(editingId);
      m.name=name;
      if(pendingAvatar!==null) m.avatar=pendingAvatar;
      m.updatedAt=Date.now(); m.synced=false;
      changed=m;
    }else{
      const id=uid();
      changed={id, name, avatar: pendingAvatar||"", updatedAt:Date.now(), synced:false};
      state.members.push(changed);
      state.present[id]=true;
    }
    save(); closeMemberModal(); renderSettle();
    pushMember(changed);
  });
  document.getElementById("modalDelete").addEventListener("click", ()=>{
    if(!editingId) return;
    if(!confirm("確定刪除這位成員？（歷史紀錄中的名字會保留）")) return;
    const removedId=editingId;
    state.members=state.members.filter(m=>m.id!==removedId);
    delete state.present[removedId];
    delete state.amounts[removedId];
    Object.keys(state.payers).forEach(k=>{ if(state.payers[k]===removedId) state.payers[k]=""; });
    save(); closeMemberModal(); renderSettle();
    deleteMemberFromSheet(removedId);
  });

  function resizeImage(file, maxSize, cb){
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let {width,height}=img;
        if(width>height){ if(width>maxSize){height*=maxSize/width;width=maxSize;} }
        else { if(height>maxSize){width*=maxSize/height;height=maxSize;} }
        const canvas=document.createElement("canvas");
        canvas.width=width; canvas.height=height;
        canvas.getContext("2d").drawImage(img,0,0,width,height);
        cb(canvas.toDataURL("image/jpeg",0.72));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  /* ---------- 清除本場 ---------- */
  document.getElementById("resetRoundBtn").addEventListener("click", ()=>{
    if(!confirm("清除本場所有金額與出席勾選？（常駐成員名單與歷史紀錄會保留）")) return;
    state.present={}; state.amounts={}; state.payers={}; state.date=todayStr();
    save(); renderSettle();
  });

  document.getElementById("refreshBtn").addEventListener("click", ()=>{ if(SYNC_ON) syncFromSheet(); });

  /* ---------- 通關密碼鎖 ---------- */
  const gateModal = document.getElementById("gateModal");
  function showGate(wrong){
    document.getElementById("gateTip").textContent = wrong
      ? "密碼錯誤，請再試一次。"
      : "請向揪團的人索取密碼，才能讀取與儲存紀錄。";
    gateModal.classList.add("show");
    setTimeout(()=>{ const p=document.getElementById("gatePass"); if(p) p.focus(); }, 50);
  }
  function hideGate(){ gateModal.classList.remove("show"); }
  function clearToken(){ sheetToken=""; localStorage.removeItem(TOKEN_KEY); }
  async function tryEnter(){
    const v = document.getElementById("gatePass").value.trim();
    if(!v) return;
    setSyncStatus("syncing");
    try{
      const url = SHEET_API + (SHEET_API.includes("?")?"&":"?") + "action=list&token=" + encodeURIComponent(v);
      const res = await fetch(url, {method:"GET"});
      const data = await res.json();
      if(!data.ok){
        if(/token/i.test(data.error||"")){ showGate(true); setSyncStatus("idle"); return; }
        throw new Error(data.error||"server error");
      }
      sheetToken = v;
      localStorage.setItem(TOKEN_KEY, v);
      document.getElementById("gatePass").value = "";
      hideGate();
      syncFromSheet();
    }catch(e){
      console.warn("密碼驗證失敗", e);
      document.getElementById("gateTip").textContent = "連線失敗，請檢查網路後再試。";
      setSyncStatus("offline");
    }
  }
  document.getElementById("gateEnter").addEventListener("click", tryEnter);
  document.getElementById("gatePass").addEventListener("keydown", e=>{ if(e.key==="Enter") tryEnter(); });

  /* ---------- init ---------- */
  load();
  renderSettle();
  if(!SYNC_ON){ document.querySelector(".sync-bar").style.display="none"; }
  renderSyncStatus();
  if(SYNC_ON) syncFromSheet();
})();
</script>
</body>
</html>
